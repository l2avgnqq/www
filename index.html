<script>
const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADENA_PER_SEC = 12000000 / 3600;

let data = {};
let alerted = {};

/* ---------- SAFE UPDATE ---------- */
function updatePlayer(p){
    if(!p.running) return;

    let last = p.last_update ? new Date(p.last_update) : new Date();
    let now = new Date();

    let diff = Math.floor((now - last)/1000);
    if(diff <= 0) return;

    let worked = Math.min(diff, p.time);

    p.time -= worked;
    p.adena += worked * ADENA_PER_SEC;
    p.last_update = now.toISOString();

    if(p.time <= 0){
        p.time = 0;
        p.running = false;
    }
}

/* ---------- LOAD (SAFE) ---------- */
async function load(){
    try{
        let res = await db.from("timers").select("*");

        if(!res || !res.data){
            console.log("NO DATA FROM DB");
            return;
        }

        let obj = {};
        res.data.forEach(p=>{
            obj[p.name] = {
                name:p.name,
                time:Number(p.time)||0,
                running:!!p.running,
                adena:Number(p.adena)||0,
                last_update:p.last_update || new Date().toISOString()
            };
        });

        data = obj;

    }catch(e){
        console.log("LOAD ERROR:", e);
    }
}

/* ---------- SAVE (SAFE) ---------- */
async function save(name,p){
    try{
        await db.from("timers").upsert({
            name:name,
            time:p.time,
            running:p.running,
            adena:p.adena,
            last_update:p.last_update
        });
    }catch(e){
        console.log("SAVE ERROR:", e);
    }
}

/* ---------- RENDER ---------- */
function render(){
    const container = document.getElementById("players");
    container.innerHTML = "";

    let total = 0;

    Object.values(data).forEach(p=> updatePlayer(p));

    let arr = Object.entries(data).sort((a,b)=> a[1].time - b[1].time);

    arr.forEach(([name,p], index)=>{
        total += p.adena;

        const div = document.createElement("div");
        div.className = "player";

        div.innerHTML = `
            <b>${name}</b>
            ${Math.floor(p.time/60)}:${(p.time%60).toString().padStart(2,"0")}
            💰 ${Math.floor(p.adena)}

            <button onclick="pause('${name}')">⏸</button>
            <button onclick="resume('${name}')">▶</button>

            <button onclick="removePlayer('${name}')">❌</button>
        `;

        container.appendChild(div);
    });

    document.getElementById("adena").innerText =
        "💰 " + Math.floor(total);
}

/* ---------- ACTIONS ---------- */

async function add(){
    let name = document.getElementById("name").value.trim();
    let min = parseInt(document.getElementById("minutes").value);
    if(!name || !min) return;

    let p = data[name] || {time:0, adena:0};

    updatePlayer(p);

    p.time += min*60;
    p.running = true;
    p.last_update = new Date().toISOString();

    data[name] = p;
    await save(name,p);
}

async function pause(name){
    let p = data[name];
    updatePlayer(p);
    p.running = false;
    await save(name,p);
}

async function resume(name){
    let p = data[name];
    p.running = true;
    p.last_update = new Date().toISOString();
    await save(name,p);
}

async function removePlayer(name){
    try{
        await db.from("timers").delete().eq("name", name);
    }catch(e){}
    delete data[name];
}

/* ---------- INIT ---------- */

document.getElementById("addBtn").onclick = add;

load();
setInterval(render,1000);
</script>
