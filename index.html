<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP</title>
<style>
body { font-family: Arial; background: linear-gradient(135deg,#1a1a2e,#16213e); color:#fff; text-align:center; margin:0; }
.container { margin:20px; }
input, button { padding:8px; margin:5px; border-radius:8px; border:none; }
button { font-weight:bold; cursor:pointer; }
.add-player-btn { background:#00adb5; color:#fff; }
.global-btn { background:#34495e; color:white; }
.players { display:grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap:15px; padding:20px; }
.player { background: rgba(255,255,255,0.08); border-radius:12px; padding:15px; }
.pause-btn { background:#f39c12; color:#fff; }
.resume-btn { background:#2ecc71; color:#fff; }
.add-btn { background:#3498db; color:#fff; }
input { width:50px; padding:3px; border-radius:5px; border:none; }
.expired { background: rgba(255,0,0,0.4); }
</style>
</head>
<body>

<h1>EXP</h1>

<div class="container">
  <input id="newName" placeholder="Ім'я нового гравця">
  <input id="newMinutes" type="number" placeholder="Хвилини">
  <button class="add-player-btn" onclick="addNewPlayer()">Додати гравця</button>
</div>

<div class="container">
  <button class="global-btn" onclick="pauseAll()">⏸ Пауза всім</button>
  <button class="global-btn" onclick="resumeAll()">▶ Продовжити всім</button>
</div>

<div id="players" class="players"></div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>

<script>
const boxURL = "https://jsonbox.io/box_exp_timer_demo"; // вигаданий Box ID
let timerData = {};
let notified = {};

function formatTime(sec){ let m=Math.floor(sec/60); let s=sec%60; return m+":"+(s<10?"0":"")+s; }
function getCurrentTime(p){ return p.running ? Math.max(0,p.time-Math.floor((Date.now()-p.start)/1000)) : p.time; }

function createPlayer(name, p){
    const container = document.getElementById("players");
    if(document.getElementById("player_"+name)) return;
    const div = document.createElement("div");
    div.id = "player_"+name;
    div.className = "player";
    div.innerHTML = `
        <b>${name}</b><br>
        Час: <span class="time">${formatTime(getCurrentTime(p))}</span><br><br>
        <button class="pause-btn">⏸ Пауза</button>
        <button class="resume-btn">▶ Продовжити</button><br><br>
        <input type="number" placeholder="+ хв">
        <button class="add-btn">Додати</button>
    `;
    container.appendChild(div);

    div.querySelector(".pause-btn").onclick = ()=>{ pause(name); saveTimer(); };
    div.querySelector(".resume-btn").onclick = ()=>{ resume(name); saveTimer(); };
    div.querySelector(".add-btn").onclick = ()=>{
        const val = parseInt(div.querySelector("input").value);
        if(!val) return;
        addTime(name,val*60);
        div.querySelector("input").value = "";
        saveTimer();
    };
}

function addNewPlayer(){
    const name = document.getElementById("newName").value.trim();
    const minutes = parseInt(document.getElementById("newMinutes").value);
    if(!name || !minutes) return;
    if(timerData[name]) addTime(name,minutes*60);
    else { timerData[name]={time:minutes*60,running:true,start:Date.now()}; createPlayer(name,timerData[name]); }
    document.getElementById("newName").value = "";
    document.getElementById("newMinutes").value = "";
    saveTimer();
}

function pause(name){ let p=timerData[name]; if(p.running){ p.time=getCurrentTime(p); p.running=false; } }
function resume(name){ let p=timerData[name]; if(!p.running){ p.start=Date.now(); p.running=true; } }
function addTime(name,sec){ let p=timerData[name]; p.time=getCurrentTime(p)+sec; p.start=Date.now(); }
function pauseAll(){ for(let n in timerData) pause(n); saveTimer(); }
function resumeAll(){ for(let n in timerData) resume(n); saveTimer(); }

async function saveTimer(){
    try{
        await fetch(boxURL,{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({players:timerData})});
    }catch(e){ console.error(e); }
}

async function loadTimer(){
    try{
        const res = await fetch(boxURL);
        const data = await res.json();
        if(!data.length) return;
        // об’єднуємо останні значення гравців
        data.forEach(entry=>{
            if(!entry.players) return;
            for(let name in entry.players){
                timerData[name] = entry.players[name];
            }
        });
        for(let name in timerData){
            createPlayer(name,timerData[name]);
        }
    }catch(e){ console.error(e); }
}

function updateTimers(){
    for(let name in timerData){
        const p=timerData[name];
        const span=document.querySelector("#player_"+name+" .time");
        const div=document.getElementById("player_"+name);
        if(span){ 
            const t = getCurrentTime(p);
            span.innerText = formatTime(t);
            if(t===0){ div.classList.add("expired"); if(!notified[name]){ document.getElementById("alarm").play(); notified[name]=true; } }
        }
    }
}

setInterval(updateTimers,1000);
setInterval(loadTimer,3000);
loadTimer();
</script>

</body>
</html>
