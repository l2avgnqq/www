<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP Lineage2</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#1a1a2e; color:#fff; }
.top { text-align:center; }

input, button {
    padding:6px;
    margin:3px;
    border-radius:6px;
    border:none;
}

button { cursor:pointer; font-weight:bold; }

#addBtn { background:#e74c3c; color:white; }
#addAllBtn { background:#9b59b6; color:white; }
.global { background:#34495e; color:white; }

.players { padding:20px; max-width:700px; }

.player {
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.warning { background:rgba(255,165,0,0.3); }
.danger { background:rgba(255,0,0,0.4); }

@keyframes blink { 50% {opacity:0.3;} }

#adena {
    font-size:22px;
    margin-top:20px;
    color:#f1c40f;
    padding-left:20px;
}
</style>
</head>

<body>

<div class="top">
    <h1>EXP Lineage2</h1>

    <input id="name" placeholder="Ім'я">
    <input id="minutes" type="number" placeholder="Хв">
    <button id="addBtn">Додати</button>

    <br>

    <input id="allMinutes" type="number" placeholder="+хв всім">
    <button id="addAllBtn">Додати всім</button>

    <br>

    <button id="pauseAll" class="global">⏸ Пауза всім</button>
    <button id="resumeAll" class="global">▶ Старт всім</button>
    <button id="clearAll" class="global">🧹 Очистити всіх</button>
</div>

<div id="players" class="players"></div>
<div id="adena">💰 0</div>

<script>
const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADENA_PER_SEC = 12000000 / 3600;

let data = {};
let alerted = {};

/* ---------- CORE ---------- */
function updatePlayer(p){
    if(!p.running) return;

    let last = p.last_update ? new Date(p.last_update) : new Date();
    let now = new Date();

    let diff = Math.floor((now - last)/1000);
    if(diff <= 0) return;

    let worked = Math.min(diff, p.time);

    p.time -= worked;
    p.adena += worked * ADENA_PER_SEC;
    p.last_update = now.toISOString();

    if(p.time <= 0){
        p.time = 0;
        p.running = false;
    }
}

/* ---------- LOAD ---------- */
async function load(){
    let res = await db.from("timers").select("*");
    if(!res.data) return;

    let obj = {};
    res.data.forEach(p=>{
        obj[p.name] = {
            name:p.name,
            time:Number(p.time)||0,
            running:!!p.running,
            adena:Number(p.adena)||0,
            last_update:p.last_update || new Date().toISOString()
        };
    });

    data = obj;
}

/* ---------- SAVE ---------- */
async function save(name,p){
    await db.from("timers").upsert({
        name:name,
        time:p.time,
        running:p.running,
        adena:p.adena,
        last_update:p.last_update
    });
}

/* ---------- RENDER ---------- */
function render(){
    const container = document.getElementById("players");
    container.innerHTML = "";

    let total = 0;

    Object.values(data).forEach(p=> updatePlayer(p));

    let arr = Object.entries(data).sort((a,b)=> a[1].time - b[1].time);

    arr.forEach(([name,p], index)=>{
        total += p.adena;

        if(p.time === 0 && !alerted[name]){
            new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
            alerted[name] = true;
        }

        const div = document.createElement("div");
        div.className = "player";

        if(p.time <= 300 && p.time > 60) div.classList.add("warning");
        if(p.time <= 60 && p.time > 0){
            div.classList.add("danger");
            div.style.animation = "blink 1s infinite";
        }

        div.innerHTML = `
            <span style="width:30px;">${index+1}.</span>
            <span style="width:120px;"><b>${name}</b></span>
            <span style="width:80px;">${Math.floor(p.time/60)}:${(p.time%60).toString().padStart(2,"0")}</span>
            <span style="width:140px;">💰 ${Math.floor(p.adena).toLocaleString()}</span>

            <button class="pause">⏸</button>
            <button class="resume">▶</button>

            <input type="number" placeholder="+хв" style="width:60px;">
            <button class="add">+</button>

            <button class="delete">❌</button>
        `;

        container.appendChild(div);

        div.querySelector(".pause").onclick = async ()=>{
            updatePlayer(p);
            p.running = false;
            await save(name,p);
        };

        div.querySelector(".resume").onclick = async ()=>{
            p.running = true;
            p.last_update = new Date().toISOString();
            alerted[name] = false;
            await save(name,p);
        };

        div.querySelector(".add").onclick = async ()=>{
            let val = parseInt(div.querySelector("input").value);
            if(!val) return;

            updatePlayer(p);

            p.time += val*60;
            p.running = true;
            p.last_update = new Date().toISOString();
            alerted[name] = false;

            await save(name,p);
        };

        div.querySelector(".delete").onclick = async ()=>{
            await db.from("timers").delete().eq("name", name);
            delete data[name];
        };
    });

    document.getElementById("adena").innerText =
        "💰 Adena: " + Math.floor(total).toLocaleString();
}

/* ---------- GLOBAL ---------- */

document.getElementById("addBtn").onclick = async ()=>{
    let name = document.getElementById("name").value.trim();
    let min = parseInt(document.getElementById("minutes").value);
    if(!name || !min) return;

    let p = data[name] || {time:0, adena:0};

    updatePlayer(p);

    p.time += min*60;
    p.running = true;
    p.last_update = new Date().toISOString();
    alerted[name] = false;

    data[name] = p;
    await save(name,p);
};

document.getElementById("addAllBtn").onclick = async ()=>{
    let min = parseInt(document.getElementById("allMinutes").value);
    if(!min) return;

    for(let name in data){
        let p = data[name];
        updatePlayer(p);

        p.time += min*60;
        p.running = true;
        p.last_update = new Date().toISOString();
        alerted[name] = false;

        await save(name,p);
    }
};

document.getElementById("pauseAll").onclick = ()=>{
    for(let name in data){
        let p = data[name];
        updatePlayer(p);
        p.running = false;
        save(name,p);
    }
};

document.getElementById("resumeAll").onclick = ()=>{
    for(let name in data){
        let p = data[name];
        p.running = true;
        p.last_update = new Date().toISOString();
        alerted[name] = false;
        save(name,p);
    }
};

document.getElementById("clearAll").onclick = async ()=>{
    await db.from("timers").delete().neq("name","");
    data = {};
};

/* ---------- INIT ---------- */

load();
setInterval(render,1000);
</script>

</body>
</html>
