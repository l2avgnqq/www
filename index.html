<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP Timer Supabase</title>
</head>
<body>
<input id="newName" placeholder="Ім'я">
<input id="newMinutes" type="number" placeholder="Хв">
<button id="addPlayerBtn">Додати</button>
<div id="players"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.umd.js"></script>
<script>
const SUPABASE_URL = 'https://gtleqxsiichgliwfkhbg.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GTPV803deiaeT6Tikf3HHg_IknudqlS';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function addPlayer() {
  const name = document.getElementById('newName').value.trim();
  const minutes = parseInt(document.getElementById('newMinutes').value);
  if(!name || !minutes) return alert('Введіть ім’я та час!');

  const start = new Date().toISOString();
  const time = minutes * 60;

  const {data,error} = await supabase.from('timers').upsert({name,time,running:true,start});
  if(error) return console.log(error);
  document.getElementById('players').innerHTML += `<div>${name} - ${minutes} хв</div>`;
}

document.getElementById('addPlayerBtn').onclick = addPlayer;
</script>
</body>
</html>
