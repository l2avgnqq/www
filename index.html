<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP Lineage2</title>

<!-- НАДІЙНИЙ CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { background:#111; color:#fff; font-family:Arial; }
button { margin:5px; padding:5px; cursor:pointer; }
</style>
</head>

<body>

<input id="name" placeholder="Ім'я">
<input id="minutes" type="number" placeholder="Хв">
<button id="addBtn">Додати</button>

<div id="players"></div>

<script>

// ---------- ПЕРЕВІРКА SUPABASE ----------
if(typeof supabase === "undefined"){
    alert("❌ Supabase не підключився");
}

// ---------- ПІДКЛЮЧЕННЯ ----------
const db = supabase.createClient(
    "https://mxwtlfkhykqegzytotlq.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE";
);

// ---------- ДАНІ ----------
let data = {};

// ---------- LOAD ----------
async function load(){
    try{
        let res = await db.from("timers").select("*");

        if(res.error){
            console.log("DB ERROR:", res.error);
            return;
        }

        data = {};

        res.data.forEach(p=>{
            data[p.name] = p;
        });

        render();

    }catch(e){
        console.log("LOAD CRASH:", e);
    }
}

// ---------- SAVE ----------
async function save(p){
    try{
        let res = await db.from("timers").upsert(p);

        if(res.error){
            console.log("SAVE ERROR:", res.error);
        } else {
            console.log("OK SAVE");
        }

    }catch(e){
        console.log("SAVE CRASH:", e);
    }
}

// ---------- RENDER ----------
function render(){
    let div = document.getElementById("players");
    div.innerHTML = "";

    for(let name in data){
        let p = data[name];

        div.innerHTML += `
            <div>
                <b>${name}</b> | ${p.time}

                <button onclick="pause('${name}')">⏸</button>
                <button onclick="resume('${name}')">▶</button>
                <button onclick="del('${name}')">❌</button>
            </div>
        `;
    }
}

// ---------- ACTIONS ----------
async function add(){
    console.log("CLICK ADD");

    let name = document.getElementById("name").value.trim();
    let min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    let p = {
        name:name,
        time:min*60,
        running:true,
        adena:0,
        last_update:new Date().toISOString()
    };

    await save(p);
    await load();
}

async function pause(name){
    let p = data[name];
    p.running = false;
    await save(p);
    await load();
}

async function resume(name){
    let p = data[name];
    p.running = true;
    await save(p);
    await load();
}

async function del(name){
    await db.from("timers").delete().eq("name", name);
    await load();
}

// ---------- INIT ----------
document.getElementById("addBtn").onclick = add;

load();

</script>

</body>
</html>
