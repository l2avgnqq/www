<script>
const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADENA_PER_SEC = 12000000 / 3600;

let data = {};
let alerted = {};

/* ---------- CORE LOGIC ---------- */

function updatePlayer(p){
    if(!p.running || !p.last_update) return p;

    let now = Date.now();
    let diff = Math.floor((now - new Date(p.last_update)) / 1000);

    if(diff <= 0) return p;

    // 🔥 скільки реально може відпрацювати
    let worked = Math.min(diff, p.time);

    p.time -= worked;
    p.adena += worked * ADENA_PER_SEC;
    p.last_update = new Date().toISOString();

    // 🔴 якщо закінчився
    if(p.time <= 0){
        p.time = 0;
        p.running = false;
    }

    return p;
}

/* ---------- FORMAT ---------- */

function format(s){
    s = Number(s)||0;
    let m = Math.floor(s/60);
    let sec = s % 60;
    return m + ":" + (sec<10?"0":"") + sec;
}

/* ---------- LOAD ---------- */

async function load(){
    const {data:rows} = await db.from("timers").select("*");

    let newData = {};
    rows.forEach(p=>{
        newData[p.name] = {
            name:p.name,
            time:Number(p.time)||0,
            running:!!p.running,
            adena:Number(p.adena)||0,
            last_update:p.last_update
        };
    });

    data = newData;
}

/* ---------- SAVE ---------- */

async function save(name,p){
    await db.from("timers").upsert({
        name:name,
        time:p.time,
        running:p.running,
        adena:p.adena,
        last_update:p.last_update
    });
}

/* ---------- RENDER ---------- */

function render(){
    const container = document.getElementById("players");
    container.innerHTML = "";

    let total = 0;

    let arr = Object.entries(data);

    // 🔥 оновлюємо ВСІХ однаково
    arr.forEach(([name,p])=>{
        updatePlayer(p);
    });

    arr.sort((a,b)=> a[1].time - b[1].time);

    arr.forEach(([name,p], index)=>{

        let t = p.time;
        let adenaNow = p.adena;

        total += adenaNow;

        // 🔊 звук
        if(t === 0 && !alerted[name]){
            playSound();
            alerted[name] = true;
        }

        const div = document.createElement("div");
        div.className = "player";

        if(t <= 300 && t > 60) div.classList.add("warning");

        if(t <= 60 && t > 0){
            div.classList.add("danger");
            div.style.animation = "blink 1s infinite";
        }

        div.innerHTML = `
            <span style="width:30px;">${index+1}.</span>
            <span style="width:120px;"><b>${name}</b></span>
            <span style="width:80px;">${format(t)}</span>
            <span style="width:140px;">💰 ${Math.floor(adenaNow).toLocaleString()}</span>

            <button class="pause">⏸</button>
            <button class="resume">▶</button>

            <input type="number" placeholder="+хв" style="width:60px;">
            <button class="add">+</button>

            <button class="delete">❌</button>
        `;

        container.appendChild(div);

        /* ---------- BUTTONS ---------- */

        div.querySelector(".pause").onclick = async ()=>{
            updatePlayer(p);
            p.running = false;
            await save(name,p);
        };

        div.querySelector(".resume").onclick = async ()=>{
            p.running = true;
            p.last_update = new Date().toISOString();
            alerted[name] = false;
            await save(name,p);
        };

        div.querySelector(".add").onclick = async ()=>{
            let val = parseInt(div.querySelector("input").value);
            if(!val) return;

            updatePlayer(p);

            p.time += val*60;
            p.running = true;
            p.last_update = new Date().toISOString();
            alerted[name] = false;

            await save(name,p);
        };

        div.querySelector(".delete").onclick = async ()=>{
            await db.from("timers").delete().eq("name", name);
            delete data[name];
        };
    });

    document.getElementById("adena").innerText =
        "💰 Adena: " + Math.floor(total).toLocaleString();
}

/* ---------- SOUND ---------- */

function playSound(){
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.play();
}

/* ---------- ACTIONS ---------- */

async function add(){
    const name = document.getElementById("name").value.trim();
    const min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    let p = data[name] || {
        time:0,
        adena:0
    };

    updatePlayer(p);

    p.time += min*60;
    p.running = true;
    p.last_update = new Date().toISOString();
    alerted[name] = false;

    data[name] = p;
    await save(name,p);
}

/* ---------- INIT ---------- */

document.getElementById("addBtn").onclick = add;

load();
setInterval(render,1000);
</script>
