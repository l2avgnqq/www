<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP Timer Online</title>

<style>
body { font-family: Arial; background:#1a1a2e; color:#fff; text-align:center; margin:0; }
.container { margin:20px; }
input, button { padding:8px; margin:5px; border-radius:8px; border:none; }
button { font-weight:bold; cursor:pointer; }
.add-player-btn { background:#00adb5; color:#fff; }
.global-btn { background:#34495e; color:white; }
.players { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:15px; padding:20px; }
.player { background: rgba(255,255,255,0.08); border-radius:12px; padding:15px; }
.pause-btn { background:#f39c12; color:#fff; }
.resume-btn { background:#2ecc71; color:#fff; }
.add-btn { background:#3498db; color:#fff; }
input { width:60px; }
.expired { background: rgba(255,0,0,0.4); }
</style>

</head>
<body>

<h1>EXP Timer Online</h1>

<div class="container">
  <input id="newName" placeholder="Ім'я">
  <input id="newMinutes" type="number" placeholder="Хв">
  <button class="add-player-btn" id="addPlayerBtn">Додати</button>
</div>

<div class="container">
  <button class="global-btn" id="pauseAllBtn">⏸ Пауза всім</button>
  <button class="global-btn" id="resumeAllBtn">▶ Старт всім</button>
</div>

<div id="players" class="players"></div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.umd.js"></script>

<script>
const SUPABASE_URL = 'https://mxwtlfkhykqegzytotlq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_-FajhSo3HLdy00i5VNemSA_89bLw5Qp';

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let timerData = {};
let notified = {};

function formatTime(sec){
    let m=Math.floor(sec/60);
    let s=sec%60;
    return m+":"+(s<10?"0":"")+s;
}

function getCurrentTime(p){
    if(!p.start) return p.time;
    if(!p.running) return p.time;

    return Math.max(0, p.time - Math.floor((Date.now() - new Date(p.start))/1000));
}

function createPlayer(name){
    if(document.getElementById("player_"+name)) return;

    const div = document.createElement("div");
    div.id = "player_"+name;
    div.className = "player";

    div.innerHTML = `
        <b>${name}</b><br>
        <span class="time">0:00</span><br><br>

        <button class="pause-btn">⏸</button>
        <button class="resume-btn">▶</button><br><br>

        <input type="number" placeholder="+хв">
        <button class="add-btn">+</button>
    `;

    document.getElementById("players").appendChild(div);

    div.querySelector(".pause-btn").onclick = async ()=>{
        let p = timerData[name];
        p.time = getCurrentTime(p);
        p.running = false;
        await save(name,p);
    };

    div.querySelector(".resume-btn").onclick = async ()=>{
        let p = timerData[name];
        p.start = new Date().toISOString();
        p.running = true;
        await save(name,p);
    };

    div.querySelector(".add-btn").onclick = async ()=>{
        let val = parseInt(div.querySelector("input").value);
        if(!val) return;

        let p = timerData[name];
        p.time = getCurrentTime(p) + val*60;
        p.start = new Date().toISOString();
        p.running = true;

        notified[name] = false;
        div.classList.remove("expired");

        div.querySelector("input").value = "";

        await save(name,p);
    };
}

async function save(name,p){
    await client.from('timers').upsert({
        name: name,
        time: p.time,
        running: p.running,
        start: p.start
    });
}

async function load(){
    const {data,error} = await client.from('timers').select('*');

    if(error){ console.log(error); return; }

    data.forEach(p=>{
        if(!timerData[p.name]){
            timerData[p.name] = p;
            createPlayer(p.name);
        } else {
            timerData[p.name] = p;
        }
    });
}

function update(){
    for(let name in timerData){
        let p = timerData[name];
        let t = getCurrentTime(p);

        let el = document.querySelector("#player_"+name+" .time");
        let div = document.getElementById("player_"+name);

        if(el){
            el.innerText = formatTime(t);

            if(t === 0){
                div.classList.add("expired");

                if(!notified[name]){
                    document.getElementById("alarm").play();
                    notified[name] = true;
                }
            }
        }
    }
}

function addPlayer(){
    const name = document.getElementById("newName").value.trim();
    const min = parseInt(document.getElementById("newMinutes").value);

    if(!name || !min) return;

    timerData[name] = {
        time: min*60,
        running: true,
        start: new Date().toISOString()
    };

    createPlayer(name);

    save(name, timerData[name]);

    document.getElementById("newName").value = "";
    document.getElementById("newMinutes").value = "";
}

function pauseAll(){
    for(let name in timerData){
        let p = timerData[name];
        p.time = getCurrentTime(p);
        p.running = false;
        save(name,p);
    }
}

function resumeAll(){
    for(let name in timerData){
        let p = timerData[name];
        p.start = new Date().toISOString();
        p.running = true;
        save(name,p);
    }
}

document.getElementById("addPlayerBtn").onclick = addPlayer;
document.getElementById("pauseAllBtn").onclick = pauseAll;
document.getElementById("resumeAllBtn").onclick = resumeAll;

setInterval(update,1000);
setInterval(load,2000);

load();
</script>

</body>
</html>
