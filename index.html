<script>
const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADENA_PER_SEC = 12000000 / 3600;

let data = {};
let alerted = {}; // щоб звук не спамив

/* ---------- SOUND ---------- */
function playSound(){
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.play();
}

/* ---------- TIME ---------- */

function format(s){
    s = Number(s)||0;
    let m = Math.floor(s/60);
    let sec = s % 60;
    return m + ":" + (sec<10?"0":"") + sec;
}

function current(p){
    let base = Number(p.time)||0;

    if(!p.running || !p.start) return base;

    let diff = Math.floor((Date.now() - new Date(p.start))/1000);
    return Math.max(0, base - diff);
}

/* ---------- FIXED ADENA ---------- */

function getAdena(p){
    let base = Number(p.adena)||0;

    if(!p.running || !p.start) return base;

    let diff = Math.floor((Date.now() - new Date(p.start))/1000);

    // 🔥 обмеження
    let max = Number(p.time)||0;
    diff = Math.min(diff, max);

    return base + diff * ADENA_PER_SEC;
}

/* ---------- LOAD ---------- */

async function load(){
    const {data:rows} = await db.from("timers").select("*");

    let newData = {};
    rows.forEach(p=>{
        newData[p.name] = {
            name:p.name,
            time:Number(p.time)||0,
            running:!!p.running,
            start:p.start,
            adena:Number(p.adena)||0
        };
    });

    data = newData;
}

/* ---------- REALTIME ---------- */

db.channel("timers")
.on("postgres_changes", {
    event:"*",
    schema:"public",
    table:"timers"
}, ()=> load())
.subscribe();

/* ---------- SAVE ---------- */

async function save(name,p){
    await db.from("timers").upsert({
        name:name,
        time:p.time,
        running:p.running,
        start:p.start,
        adena:p.adena
    });
}

/* ---------- RENDER ---------- */

function render(){
    const container = document.getElementById("players");
    container.innerHTML = "";

    let total = 0;

    let arr = Object.entries(data);
    arr.sort((a,b)=> current(a[1]) - current(b[1]));

    arr.forEach(([name,p], index)=>{

        let t = current(p);

        // 🔥 AUTO STOP
        if(t === 0 && p.running){
            p.time = 0;
            p.adena = getAdena(p);
            p.running = false;
            p.start = null;
            save(name,p);

            if(!alerted[name]){
                playSound();
                alerted[name] = true;
            }
        }

        let adenaNow = getAdena(p);
        total += adenaNow;

        const div = document.createElement("div");
        div.className = "player";

        // 🔥 COLORS
        if(t <= 300 && t > 60) div.classList.add("warning");
        if(t <= 60 && t > 0){
            div.classList.add("danger");
            div.style.animation = "blink 1s infinite";
        }

        div.innerHTML = `
            <span style="width:30px;">${index+1}.</span>
            <span style="width:120px;"><b>${name}</b></span>
            <span style="width:80px;">${format(t)}</span>
            <span style="width:140px;">💰 ${Math.floor(adenaNow).toLocaleString()}</span>

            <button class="pause">⏸</button>
            <button class="resume">▶</button>

            <input type="number" placeholder="+хв" style="width:60px;">
            <button class="add">+</button>

            <button class="delete">❌</button>
        `;

        container.appendChild(div);

        /* ---------- BUTTONS ---------- */

        div.querySelector(".pause").onclick = async ()=>{
            p.time = current(p);
            p.adena = getAdena(p);
            p.running = false;
            p.start = null;
            await save(name,p);
        };

        div.querySelector(".resume").onclick = async ()=>{
            alerted[name] = false;
            p.start = new Date().toISOString();
            p.running = true;
            await save(name,p);
        };

        div.querySelector(".add").onclick = async ()=>{
            let val = parseInt(div.querySelector("input").value);
            if(!val) return;

            p.time = current(p) + val*60;
            p.adena = getAdena(p);
            p.start = new Date().toISOString();
            p.running = true;

            alerted[name] = false;
            await save(name,p);
        };

        div.querySelector(".delete").onclick = async ()=>{
            await db.from("timers").delete().eq("name", name);
            delete data[name];
        };
    });

    document.getElementById("adena").innerText =
        "💰 Adena: " + Math.floor(total).toLocaleString();
}

/* ---------- ACTIONS ---------- */

async function add(){
    const name = document.getElementById("name").value.trim();
    const min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    let p = data[name] || {time:0, adena:0};

    p.time = current(p) + min*60;
    p.adena = getAdena(p);
    p.start = new Date().toISOString();
    p.running = true;

    alerted[name] = false;

    data[name] = p;
    await save(name,p);
}

async function addAll(){
    let min = parseInt(document.getElementById("allMinutes").value);
    if(!min) return;

    for(let name in data){
        let p = data[name];

        p.time = current(p) + min*60;
        p.adena = getAdena(p);
        p.start = new Date().toISOString();
        p.running = true;

        alerted[name] = false;
        await save(name,p);
    }
}

function pauseAll(){
    for(let name in data){
        let p = data[name];
        p.time = current(p);
        p.adena = getAdena(p);
        p.running = false;
        p.start = null;
        save(name,p);
    }
}

function resumeAll(){
    for(let name in data){
        let p = data[name];
        p.start = new Date().toISOString();
        p.running = true;
        alerted[name] = false;
        save(name,p);
    }
}

async function clearAll(){
    await db.from("timers").delete().neq("name","");
    data = {};
}

/* ---------- INIT ---------- */

document.getElementById("addBtn").onclick = add;
document.getElementById("addAllBtn").onclick = addAll;
document.getElementById("pauseAll").onclick = pauseAll;
document.getElementById("resumeAll").onclick = resumeAll;
document.getElementById("clearAll").onclick = clearAll;

load();
setInterval(render,1000);
</script>
