<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP Lineage2</title>

<style>
body { font-family: Arial; background:#1a1a2e; color:#fff; text-align:center; }

input, button {
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}

button { cursor:pointer; font-weight:bold; }

#addBtn { background:#e74c3c; color:white; }
#addAllBtn { background:#9b59b6; color:white; }

.global { background:#34495e; color:white; }

/* ✅ ВЕРТИКАЛЬНИЙ СПИСОК */
.players {
    display:flex;
    flex-direction:column;
    gap:15px;
    padding:20px;
    max-width:400px;
    margin:0 auto;
}

.player {
    background:rgba(255,255,255,0.1);
    padding:10px;
    border-radius:10px;
    transition:0.3s;
}

.warning { background:rgba(255,165,0,0.4); }
.danger { background:rgba(255,0,0,0.5); }

.pause { background:#f39c12; }
.resume { background:#2ecc71; }
.add { background:#3498db; }
.delete { background:#c0392b; color:white; }

#adena {
    font-size:22px;
    margin-top:20px;
    color:#f1c40f;
}
</style>
</head>

<body>

<h1>EXP Lineaage2</h1>

<input id="name" placeholder="Ім'я">
<input id="minutes" type="number" placeholder="Хв">
<button id="addBtn">Додати</button>

<br>

<input id="allMinutes" type="number" placeholder="+хв всім">
<button id="addAllBtn">Додати всім</button>

<br>

<button id="pauseAll" class="global">⏸ Пауза всім</button>
<button id="resumeAll" class="global">▶ Старт всім</button>
<button id="clearAll" class="global">🧹 Очистити всіх</button>

<div id="players" class="players"></div>

<div id="adena">💰 Adena: 0</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
(function(){

const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE';
const ADENA_PER_SEC = 12000000 / 3600;

let db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data = {};
let lastTime = {};
let totalAdenaGlobal = 0;

function format(s){
    let m = Math.floor(s/60);
    let sec = s%60;
    return m+":"+(sec<10?"0":"")+sec;
}

function current(p){
    if(!p.running) return p.time;
    if(!p.start) return p.time;

    let diff = Math.floor((Date.now() - new Date(p.start)) / 1000);
    return Math.max(0, p.time - diff);
}

async function updateAdena(){
    let total = totalAdenaGlobal;

    for(let name in data){
        let p = data[name];
        let now = current(p);

        if(lastTime[name] !== undefined){
            let diff = lastTime[name] - now;

            if(diff > 0){
                let gained = Math.floor(diff * ADENA_PER_SEC);
                p.adena = (p.adena || 0) + gained;

                totalAdenaGlobal += gained;

                await db.from("timers").update({
                    adena: p.adena
                }).eq("name", name);
            }
        }

        lastTime[name] = now;
    }

    document.getElementById("adena").innerText =
        "💰 Adena: " + total.toLocaleString();
}

function render(){
    const container = document.getElementById("players");
    container.innerHTML = "";

    let arr = Object.entries(data);

    arr.sort((a,b)=> current(a[1]) - current(b[1]));

    arr.forEach(([name,p])=>{
        const div = document.createElement("div");
        div.className = "player";

        let t = current(p);

        if(t <= 300 && t > 0) div.classList.add("warning");
        if(t === 0) div.classList.add("danger");

        div.innerHTML = `
            <b>${name}</b> <button class="delete">❌</button><br>
            <span>${format(t)}</span><br><br>

            <button class="pause">⏸</button>
            <button class="resume">▶</button><br><br>

            <input type="number" placeholder="+хв">
            <button class="add">+</button>
        `;

        container.appendChild(div);

        div.querySelector(".pause").onclick = async ()=>{
            p.time = current(p);
            p.running = false;
            p.start = null;
            await save(name,p);
        };

        div.querySelector(".resume").onclick = async ()=>{
            p.start = new Date().toISOString();
            p.running = true;
            await save(name,p);
        };

        div.querySelector(".add").onclick = async ()=>{
            let val = parseInt(div.querySelector("input").value);
            if(isNaN(val) || val <= 0) return;

            p.time = current(p) + val*60;
            p.start = new Date().toISOString();
            p.running = true;

            await save(name,p);
        };

        div.querySelector(".delete").onclick = async ()=>{
            let p = data[name];

            if(p && p.adena){
                totalAdenaGlobal += p.adena;
            }

            delete data[name];

            await db.from("timers").delete().eq("name", name);
        };
    });
}

async function save(name,p){
    await db.from("timers").upsert({
        name:name,
        time:p.time,
        running:p.running,
        start:p.start,
        adena:p.adena || 0
    });
}

async function load(){
    const {data:rows} = await db.from("timers").select("*");

    let newData = {};
    rows.forEach(p=> newData[p.name] = p);

    data = newData;
}

async function add(){
    const name = document.getElementById("name").value;
    const min = parseInt(document.getElementById("minutes").value);

    if(!name || isNaN(min) || min <= 0) return;

    if(data[name]){
        let p = data[name];
        p.time = current(p) + min*60;
        p.start = new Date().toISOString();
        p.running = true;
        await save(name,p);
        return;
    }

    let p = {
        time:min*60,
        running:true,
        start:new Date().toISOString(),
        adena:0
    };

    data[name]=p;
    await save(name,p);
}

async function addAll(){
    let min = parseInt(document.getElementById("allMinutes").value);
    if(isNaN(min) || min <= 0) return;

    for(let name in data){
        let p = data[name];
        p.time = current(p) + min*60;
        p.start = new Date().toISOString();
        p.running = true;
        await save(name,p);
    }
}

function pauseAll(){
    for(let name in data){
        let p = data[name];
        p.time = current(p);
        p.running = false;
        p.start = null;
        save(name,p);
    }
}

function resumeAll(){
    for(let name in data){
        let p = data[name];
        p.start = new Date().toISOString();
        p.running = true;
        save(name,p);
    }
}

async function clearAll(){
    await db.from("timers").delete().neq("name","");
    data = {};
}

document.getElementById("addBtn").onclick = add;
document.getElementById("addAllBtn").onclick = addAll;
document.getElementById("pauseAll").onclick = pauseAll;
document.getElementById("resumeAll").onclick = resumeAll;
document.getElementById("clearAll").onclick = clearAll;

setInterval(load,1000);
setInterval(render,1000);
setInterval(updateAdena,1000);

})();
</script>

</body>
</html>
