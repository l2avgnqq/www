<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP Timer Online</title>

<style>
body { font-family: Arial; background:#1a1a2e; color:#fff; text-align:center; margin:0; }
.container { margin:20px; }
input, button { padding:8px; margin:5px; border-radius:8px; border:none; }
button { font-weight:bold; cursor:pointer; }
.add-player-btn { background:#00adb5; color:#fff; }
.global-btn { background:#34495e; color:white; }
.players { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:15px; padding:20px; }
.player { background: rgba(255,255,255,0.08); border-radius:12px; padding:15px; }
.pause-btn { background:#f39c12; color:#fff; }
.resume-btn { background:#2ecc71; color:#fff; }
.add-btn { background:#3498db; color:#fff; }
input { width:60px; }
.expired { background: rgba(255,0,0,0.4); }
</style>

</head>
<body>

<h1>EXP Timer Online</h1>

<div class="container">
  <input id="newName" placeholder="Ім'я">
  <input id="newMinutes" type="number" placeholder="Хв">
  <button id="addPlayerBtn">Додати</button>
</div>

<div id="players" class="players"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
const SUPABASE_URL = 'https://mxwtlfkhykqegzytotlq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE';


const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let timerData = {};

function createPlayer(name, time){
    const div = document.createElement("div");
    div.className = "player";

    div.innerHTML = `
        <b>${name}</b><br>
        <span>${time}s</span>
    `;

    document.getElementById("players").appendChild(div);
}

async function load(){
    const {data,error} = await client.from('timers').select('*');

    if(error){
        console.log("LOAD ERROR:", error);
        return;
    }

    document.getElementById("players").innerHTML = "";

    data.forEach(p=>{
        createPlayer(p.name, p.time);
    });
}

async function addPlayer(){
    const name = document.getElementById("newName").value;
    const min = parseInt(document.getElementById("newMinutes").value);

    if(!name || !min) return;

    const {error} = await client.from('timers').insert({
        name: name,
        time: min*60
    });

    if(error){
        console.log("SAVE ERROR:", error);
    }

    load();
}

document.getElementById("addPlayerBtn").onclick = addPlayer;

load();
</script>

</body>
</html>
